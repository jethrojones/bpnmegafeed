name: Build and deploy mega feed

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TRANSISTOR_API_KEY: ${{ secrets.TRANSISTOR_API_KEY }}
      TRANSISTOR_INCLUDE_PRIVATE: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh feed list from Transistor
        if: env.TRANSISTOR_API_KEY != ''
        run: npm run feeds:transistor

      - name: Run tests
        run: npm test

      - name: Build static feed
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
